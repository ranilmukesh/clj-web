# Global build configurations
[build]
  # Next.js compiles your site into the ".next" directory by default
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Specifying a modern LTS Node version helps ensure build consistency
  NODE_VERSION = "20"
  # Speeds up dependency installation by skipping unnecessary security audits and funding messages
  NPM_FLAGS = "--no-audit --no-fund"

# Cache-control for Next.js static assets
# Next.js hashes built files inside the _next/static directory.
# We can safely cache these files indefinitely to speed up subsequent visits.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Header configurations for top-level documents
# We prevent caching here so users always fetch the newest pages immediately after a deployment.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    # Basic security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "frame-ancestors 'self';"
